name: first-pipeline

on: 
  push:
       branches: [master]
  workflow_dispatch: 
jobs:
  job-1:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@5
      - name: Set up python
        uses: actions/set-up-python@6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run script
        run: python app.py
